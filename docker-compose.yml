services:
  postgres:
    image: postgres:16-alpine
    container_name: aboutme-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-aboutme}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-aboutme}
      POSTGRES_DB: ${DATABASE_NAME:-aboutme}
    ports:
      - "5432:5432"
    volumes:
      - aboutme_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-aboutme}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aboutme-redis
    ports:
      - "6379:6379"
    volumes:
      - aboutme_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: aboutme-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - aboutme_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  aboutme_postgres_data:
  aboutme_redis_data:
  aboutme_minio_data:
